<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perya Color Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <div class="container">
        <h1>Perya Color Game</h1>

        <div class="game-container">
          <div class="dice" id="dice1">
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
          </div>

          <div class="dice" id="dice2">
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
          </div>

          <div class="dice" id="dice3">
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
            <div class="side"></div>
          </div>
        </div>

        <div class="roll-button" id="roll"><button>Roll Dice!</button></div>

        <div class="history">
          <h3>Spin History</h3>
          <div id="history-list"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
