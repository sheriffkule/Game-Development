<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Magic Trick</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <h1>Card Magic Trick</h1>
      <p class="subtitle">Think of one card. Click the column it appears in. Repeat 3 times.</p>

      <div class="board" id="board"></div>

      <div class="controls">
        <div class="status" id="status">Round 1 of 3 - chose a column</div>
        <button id="actionBtn">Next</button>
      </div>

      <div class="reveal" id="reveal"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
