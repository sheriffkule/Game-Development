      <div class="box">
        <img
          src="https://res.cloudinary.com/beumsk/image/upload/v1523567681/donkey-kong.png"

      </div>
      <div class="box">
        <img
          src="https://res.cloudinary.com/beumsk/image/upload/v1523567681/donkey-kong.png"

        <img
          src="https://res.cloudinary.com/beumsk/image/upload/v1523567681/donkey-kong.png"

          src="https://res.cloudinary.com/beumsk/image/upload/v1523567681/donkey-kong.png"

      </div>
      <div class="box">
        <img
          src="https://res.cloudinary.com/beumsk/image/upload/v1523567681/donkey-kong.png"

      </div>
      <div class="box">
        <img
          src="https://res.cloudinary.com/beumsk/image/upload/v1523567681/donkey-kong.png"
          alt="Donkey Kong" />
      </div>
    </section>

    <section class="modal hidden">
      <div>
        <p>Hit the Monkey to get a score!</p>
        <span class="end">Play now</span>
      </div>
    </section>

    <script src="script.js"></script>
