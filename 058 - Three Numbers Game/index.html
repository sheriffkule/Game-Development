<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three Numbers Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Number 3 Matching Game</h1>
    <div class="container">
      <div class="ctn-cyphers">
        <div class="cypher-1"><span>1</span></div>
        <div class="cypher-2"><span>2</span></div>
        <div class="cypher-3"><span>3</span></div>
      </div>
      <div class="result" id="result">
        <p>
          Round <span class="round" id="round">1:</span>
          <span class="content-result" id="content-result">Click and get 3 equal numbers</span>
        </p>
      </div>
      <div class="reset" id="reset">
        <button type="button"></button>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
